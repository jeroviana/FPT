<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FIUNA Para Todos</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,400&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --fiuna-red: #8B0000; 
            --fiuna-gray: #4A4A4A;
            --accent-gold: #B8860B;
            --bg-canvas: #F4F4F4;
            --card-white: #FFFFFF;
            --glass: rgba(255, 255, 255, 0.7);
        }

        * { 
            -webkit-tap-highlight-color: transparent; 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0;
        }

        body { 
            font-family: 'Montserrat', sans-serif; 
            background-color: var(--bg-canvas); 
            color: var(--fiuna-gray); 
            overflow-x: hidden; 
            line-height: 1.6;
        }

        /* --- PANTALLA DE BIENVENIDA (ESTILO POÉTICO) --- */
        #welcome-screen { 
            position: fixed; inset: 0; background: var(--bg-canvas); z-index: 10000; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            padding: 40px; text-align: center; transition: opacity 1.2s ease-in-out; 
        }

        .welcome-text h2 { 
            font-family: 'Playfair Display', serif; font-style: italic; font-size: 2rem; 
            margin-bottom: 30px; color: var(--fiuna-red); opacity: 0;
            animation: fadeInPoetic 1.2s forwards 0.5s; 
        }

        .welcome-text p { 
            font-family: 'Playfair Display', serif; font-size: 1.15rem; line-height: 1.8; 
            margin-bottom: 25px; opacity: 0; text-align: center; max-width: 320px;
        }

        .p1 { animation: fadeInPoetic 1.2s forwards 1.2s; }
        .p2 { animation: fadeInPoetic 1.2s forwards 2.2s; }
        
        #entrar-btn { 
            margin-top: 30px; padding: 18px 60px; border-radius: 50px; border: 2px solid var(--fiuna-red); 
            background: transparent; color: var(--fiuna-red); font-family: 'Montserrat', serif; 
            font-size: 1rem; font-weight: 700; cursor: pointer; 
            opacity: 0; animation: fadeInPoetic 1.2s forwards 3.2s; 
            transition: all 0.3s;
        }

        #entrar-btn:active { background: var(--fiuna-red); color: white; transform: scale(0.95); }

        @keyframes fadeInPoetic { 
            from { opacity: 0; transform: translateY(20px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        /* --- INTRO VIDEO --- */
        #intro-screen { 
            position: fixed; inset: 0; background: #000; z-index: 9999; 
            display: none; align-items: center; justify-content: center; 
            opacity: 0; transition: opacity 1.2s ease-in-out; 
        }
        #intro-video { width: 100%; height: 100%; object-fit: cover; }

        /* --- APP CONTAINER --- */
        #app-container { 
            width: 100%; max-width: 480px; margin: 0 auto; 
            display: none; opacity: 0; transition: opacity 1.5s ease-in-out; padding-bottom: 60px;
        }

        .hero { padding: 30px 20px; text-align: center; }
        .logo-main { width: 120px; height: auto; margin-bottom: 15px; filter: drop-shadow(0 5px 15px rgba(0,0,0,0.1)); }
        
        .nav-chips { display: flex; overflow-x: auto; gap: 10px; padding: 15px 20px; scrollbar-width: none; }
        .nav-chips::-webkit-scrollbar { display: none; }
        .chip { 
            background: white; padding: 10px 20px; border-radius: 20px; font-size: 0.8rem; 
            white-space: nowrap; font-weight: 600; box-shadow: 0 4px 10px rgba(0,0,0,0.05); 
        }

        /* --- SECCIÓN COLAPSIBLE (MECANISMO JEROVIA) --- */
        .fpt-card { 
            width: 92%; margin: 20px auto; border-radius: 30px; overflow: hidden; 
            background: var(--card-white); position: relative; cursor: pointer;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08); transition: all 0.5s ease;
        }

        .banner-box { position: relative; width: 100%; z-index: 10; transition: transform 0.8s cubic-bezier(0.65, 0, 0.35, 1); }
        .banner-img { width: 100%; height: auto; display: block; }
        
        .active .banner-box { transform: translateY(-100%); position: absolute; }
        
        .expanded-content { 
            display: none; padding: 50px 25px 30px; background: white; 
            opacity: 0; transform: translateY(20px); 
        }
        .active .expanded-content { display: block; opacity: 1; transform: translateY(0); animation: slideUp 0.6s forwards; }

        @keyframes slideUp { to { opacity: 1; transform: translateY(0); } }

        .close-btn { position: absolute; top: 15px; right: 25px; font-size: 2.2rem; color: var(--fiuna-red); z-index: 100; }

        /* --- SLIDER DE PROPUESTAS / AUTORIDADES --- */
        .slider-container { position: relative; overflow: hidden; margin-top: 20px; }
        .slider-track { display: flex; transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1); }
        .slide { 
            min-width: 100%; padding: 10px; text-align: center; 
            display: flex; flex-direction: column; align-items: center; 
        }
        .slide img { width: 200px; height: 260px; object-fit: cover; border-radius: 20px; margin-bottom: 15px; }

        /* --- ACORDEONES INTERNOS --- */
        .acc-group { margin-top: 20px; }
        .acc-trigger { 
            padding: 15px; border-bottom: 1px solid #eee; display: flex; 
            justify-content: space-between; font-weight: 700; font-size: 0.9rem;
        }
        .acc-body { max-height: 0; overflow: hidden; transition: 0.4s; padding: 0 15px; font-size: 0.85rem; color: #666; }
        .open .acc-body { max-height: 200px; padding: 15px; }

        /* --- BOTONES --- */
        .cta-button { 
            display: block; width: 85%; margin: 25px auto; padding: 18px; 
            background: linear-gradient(135deg, var(--fiuna-red), #5e0000); 
            color: white; text-align: center; text-decoration: none; border-radius: 15px; 
            font-weight: 700; font-size: 0.9rem; box-shadow: 0 10px 20px rgba(139, 0, 0, 0.2);
        }

        #lightbox { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 20000; display: none; align-items: center; justify-content: center; }
        #lb-img { max-width: 90%; max-height: 80%; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="welcome-screen">
        <div class="welcome-text">
            <h2>FIUNA Para Todos</h2>
            <p class="p1">Construyendo una facultad más justa, técnica y humana.</p>
            <p class="p2">Porque la ingeniería la hacemos entre todos.</p>
        </div>
        <button id="entrar-btn" onclick="iniciarExperiencia()">Ingresar</button>
    </div>

    <div id="intro-screen">
        <video id="intro-video" playsinline muted preload="auto"></video>
    </div>

    <div id="app-container">
        <div class="hero">
            <img id="logo-fpt" src="" class="logo-main">
            <h1 id="main-title">FIUNA Para Todos</h1>
            <p id="main-slogan" style="font-size: 0.85rem; font-style: italic; color: var(--accent-gold);"></p>
        </div>

        <div class="nav-chips">
            <div class="chip">#Propuestas</div>
            <div class="chip">#Autoridades</div>
            <div class="chip">#Estatutos</div>
            <div class="chip">#Contacto</div>
        </div>

        <div id="sec-prop" class="fpt-card" onclick="toggleCard('sec-prop')">
            <div class="banner-box">
                <img id="banner-prop" src="" class="banner-img">
            </div>
            <div class="expanded-content" onclick="event.stopPropagation()">
                <span class="close-btn" onclick="toggleCard('sec-prop')">&times;</span>
                <h3 id="prop-tit" style="font-family: 'Playfair Display'; font-size: 1.5rem; margin-bottom: 10px;"></h3>
                <p id="prop-desc" style="font-size: 0.85rem; margin-bottom: 20px;"></p>
                <div class="acc-group" id="prop-list"></div>
            </div>
        </div>

        <div id="sec-team" class="fpt-card" onclick="toggleCard('sec-team')">
            <div class="banner-box">
                <img id="banner-team" src="" class="banner-img">
            </div>
            <div class="expanded-content" onclick="event.stopPropagation()">
                <span class="close-btn" onclick="toggleCard('sec-team')">&times;</span>
                <h3 id="team-tit">Nuestro Equipo</h3>
                <div class="slider-container">
                    <div class="slider-track" id="team-track"></div>
                </div>
                <div style="display:flex; justify-content:center; gap:20px; margin-top:15px;">
                    <button onclick="moveSlide(-1)" style="background:none; border:none; font-size:1.5rem;">←</button>
                    <button onclick="moveSlide(1)" style="background:none; border:none; font-size:1.5rem;">→</button>
                </div>
            </div>
        </div>

        <a id="cta-link" href="#" class="cta-button">VER PLAN DE GOBIERNO 2026</a>
    </div>

    <div id="lightbox" onclick="this.style.display='none'"><img id="lb-img" src=""></div>

    <script>
        const API_URL = "URL_DE_TU_GOOGLE_SCRIPT"; 
        let teamData = [];
        let currentSlide = 0;

        function cleanURL(url) {
            if(!url) return "";
            if(url.includes('imgur.com')) {
                const id = url.split('/').pop().split('.')[0];
                return `https://i.imgur.com/${id}.jpg`;
            }
            return url;
        }

        async function loadData() {
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                
                // Header
                document.getElementById('logo-fpt').src = cleanURL(data.info.logo);
                document.getElementById('main-slogan').innerText = data.info.slogan;
                
                // Propuestas
                document.getElementById('banner-prop').src = cleanURL(data.propuestas.portada);
                document.getElementById('prop-tit').innerText = data.propuestas.titulo;
                document.getElementById('prop-desc').innerText = data.propuestas.introduccion;
                
                const propHTML = data.propuestas.items.map(item => `
                    <div class="acc-item" onclick="this.classList.toggle('open')">
                        <div class="acc-trigger">${item.eje} <span>+</span></div>
                        <div class="acc-body">${item.detalle}</div>
                    </div>
                `).join('');
                document.getElementById('prop-list').innerHTML = propHTML;

                // Equipo
                teamData = data.equipo.miembros;
                document.getElementById('banner-team').src = cleanURL(data.equipo.portada);
                renderTeam();

                // Video
                if(data.info.videoIntro) {
                    const vid = document.getElementById('intro-video');
                    vid.src = data.info.videoIntro;
                }

            } catch (e) { console.warn("Error cargando datos:", e); }
        }

        function renderTeam() {
            const track = document.getElementById('team-track');
            track.innerHTML = teamData.map(m => `
                <div class="slide">
                    <img src="${cleanURL(m.foto)}" onclick="openLB('${cleanURL(m.foto)}')">
                    <h4 style="color:var(--fiuna-red)">${m.nombre}</h4>
                    <p style="font-size:0.75rem; font-weight:700;">${m.cargo}</p>
                    <p style="font-size:0.8rem; margin-top:10px; color:#555;">${m.frase}</p>
                </div>
            `).join('');
        }

        function moveSlide(step) {
            currentSlide = (currentSlide + step + teamData.length) % teamData.length;
            document.getElementById('team-track').style.transform = `translateX(-${currentSlide * 100}%)`;
        }

        function toggleCard(id) {
            document.getElementById(id).classList.toggle('active');
        }

        function iniciarExperiencia() {
            const v = document.getElementById('intro-video');
            document.getElementById('welcome-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('welcome-screen').style.display = 'none';
                if(v.src) {
                    document.getElementById('intro-screen').style.display = 'flex';
                    setTimeout(() => document.getElementById('intro-screen').style.opacity = '1', 50);
                    v.play().catch(mostrarMain);
                    v.onended = mostrarMain;
                } else { mostrarMain(); }
            }, 1200);
        }

        function mostrarMain() {
            document.getElementById('intro-screen').style.display = 'none';
            const app = document.getElementById('app-container');
            app.style.display = 'block';
            setTimeout(() => app.style.opacity = '1', 50);
        }

        function openLB(src) {
            document.getElementById('lb-img').src = src;
            document.getElementById('lightbox').style.display = 'flex';
        }

        window.onload = loadData;
    </script>
</body>
</html>
