<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FIUNA Para Todos - FPT</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,400&family=Montserrat:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --fpt-red: #D31224;
            --fpt-black: #1A1A1A;
            --fpt-white: #FFFFFF;
            --card-cream: #FFFFFF;
            --glow-shadow: rgba(211, 18, 36, 0.3);
        }
        * { 
            -webkit-tap-highlight-color: transparent; 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0;
        }
        body { 
            font-family: 'Montserrat', sans-serif; 
            background-color: #F4F4F4; 
            color: var(--fpt-black); 
            overflow-x: hidden; 
            line-height: 1.5;
        }
        /* Pantalla de bienvenida */
        #welcome-screen { 
            position: fixed; 
            inset: 0; 
            background: var(--fpt-black); 
            z-index: 10000; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            padding: 40px; 
            text-align: center; 
            transition: opacity 1.2s ease-in-out, visibility 1.2s; 
        }
        .welcome-text h2 { 
            font-family: 'Playfair Display', serif; 
            font-style: italic; 
            font-size: 2rem; 
            margin-bottom: 25px; 
            color: var(--fpt-white); 
            opacity: 0;
            animation: fadeInPoetic 1.2s forwards 0.5s; 
        }
        .welcome-text p { 
            font-family: 'Playfair Display', serif; 
            font-size: 1.1rem; 
            line-height: 1.8; 
            margin-bottom: 20px; 
            color: #CCCCCC; 
            opacity: 0;
        }
        .p1 { animation: fadeInPoetic 1.2s forwards 1.2s; }
        .p2 { animation: fadeInPoetic 1.2s forwards 2.2s; }
        #conocenos-btn { 
            margin-top: 20px; 
            padding: 18px 50px; 
            border-radius: 50px; 
            border: none; 
            background: var(--fpt-red); 
            color: white; 
            font-family: 'Playfair Display', serif; 
            font-size: 1.1rem; 
            font-weight: 700; 
            cursor: pointer; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            opacity: 0; 
            animation: fadeInPoetic 1.2s forwards 3.2s;
            transition: transform 0.3s;
        }
        @keyframes fadeInPoetic { 
            from { opacity: 0; transform: translateY(15px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
        /* Intro video */
        #intro-screen { 
            position: fixed; 
            inset: 0; 
            background: #000; 
            z-index: 9999; 
            display: none; 
            align-items: center; 
            justify-content: center; 
            opacity: 0; 
            transition: opacity 1.2s ease-in-out; 
        }
        #intro-video { width: 100%; height: 100%; object-fit: cover; }
        /* Contenedor principal */
        #app-container { 
            width: 100%; 
            max-width: 450px; 
            margin: 0 auto; 
            display: none; 
            opacity: 0; 
            transition: opacity 1.5s ease-in-out; 
            padding-bottom: 40px;
        }
        .hero-section { 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            padding: 20px 0; 
        }
        .header { text-align: center; padding: 10px 0; }
        .logo-img { width: 100px; height: auto; margin-bottom: 5px; }
        h1 { font-family: 'Playfair Display', serif; font-size: 1.6rem; margin: 5px 0; font-weight: 800; text-transform: uppercase; color: var(--fpt-black); }
        .cover-img { 
            width: 90%; margin: 15px auto; border-radius: 30px; object-fit: cover; 
            max-height: 38vh; display: block; box-shadow: 0 15px 30px rgba(0,0,0,0.1);
        }
        /* Acordeones dinámicos */
        .info-accordion { width: 90%; margin: 0 auto 20px; }
        .acc-item {
            background: var(--card-cream);
            margin-bottom: 12px;
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.4s ease;
            border: 1px solid rgba(0,0,0,0.05);
            box-shadow: 0 5px 15px rgba(0,0,0,0.03);
        }
        .acc-header {
            padding: 18px 22px;
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            font-size: 0.95rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            color: var(--fpt-black);
        }
        .arrow-icon { font-size: 0.8rem; transition: transform 0.4s ease; color: var(--fpt-red); }
        .acc-content {
            max-height: 0;
            opacity: 0;
            overflow: hidden;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 0.88rem;
            color: #444;
            padding: 0 22px;
            text-align: justify;
            transform: translateY(-10px);
        }
        .acc-item.open { background: #FAFAFA; }
        .acc-item.open .acc-content {
            max-height: 1200px;
            opacity: 1;
            padding-bottom: 20px;
            transform: translateY(0);
        }
        .acc-item.open .arrow-icon { transform: rotate(180deg); }
        /* Secretarías dentro del acordeón */
        .secretaria-accordion {
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding: 5px 0 15px 0;
        }
        .sec-item {
            width: 100%;
            background: #F9F9F9;
            border-radius: 12px;
            cursor: pointer;
            border: 1px solid #EAEAEA;
            transition: all 0.2s;
        }
        .sec-title {
            font-family: 'Playfair Display', serif;
            font-weight: 800;
            font-size: 1rem;
            padding: 14px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: var(--fpt-black);
        }
        .sec-title span:first-child::before {
            content: "▸";
            color: var(--fpt-red);
            margin-right: 12px;
            font-size: 1rem;
        }
        .sec-desc {
            max-height: 0;
            overflow: hidden;
            transition: all 0.4s ease;
            font-size: 0.85rem;
            color: #555;
            padding: 0 16px;
            text-align: justify;
        }
        .sec-item.open {
            background: white;
            border-left: 4px solid var(--fpt-red);
        }
        .sec-item.open .sec-desc {
            max-height: 200px;
            overflow-y: auto;
            padding-bottom: 16px;
        }
        .sec-cand-link {
            display: inline-block;
            margin-top: 12px;
            background: var(--fpt-black);
            color: white;
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 700;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border: none;
            cursor: pointer;
            font-family: 'Montserrat', sans-serif;
        }
        /* Botones */
        .flat-btn { 
            display: block; width: 85%; margin: 12px auto; padding: 16px 0;
            background: var(--fpt-red); color: white; text-align: center; text-decoration: none;
            border-radius: 15px; font-weight: 800; text-transform: uppercase; font-size: 0.8rem;
            letter-spacing: 1px; box-shadow: 0 4px 15px var(--glow-shadow);
            transition: transform 0.2s;
        }
        #link-whatsapp { background: var(--fpt-black); animation: pulseButton 2s infinite ease-in-out; }
        @keyframes pulseButton { 0% { transform: scale(1); } 50% { transform: scale(1.02); } 100% { transform: scale(1); } }
        /* Secciones colapsables tipo banner */
        .collapsible-section { 
            width: 92%; margin: 15px auto; border-radius: 25px; overflow: hidden;
            background: white; position: relative; cursor: pointer; box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            transition: opacity 0.4s ease;
        }
        .section-banner-container { position: relative; width: 100%; z-index: 20; }
        .section-banner { width: 100%; height: auto; display: block; }
        .active .section-banner-container { 
            transform: translateY(-100%); position: absolute; 
            transition: transform 0.8s cubic-bezier(0.65, 0, 0.35, 1);
        }
        .click-notice {
            position: absolute; bottom: 15px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); padding: 5px 15px;
            border-radius: 20px; font-size: 0.65rem; font-weight: 700; color: white;
            text-transform: uppercase; letter-spacing: 1px; z-index: 25; pointer-events: none;
        }
        .content-area { 
            display: none; background: white; padding: 40px 0 20px; text-align: center; opacity: 0;
        }
        .active .content-area { display: block; opacity: 1; animation: fadeInContent 0.8s forwards; }
        .closing { opacity: 0; transition: opacity 0.5s ease; }
        @keyframes fadeInContent { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .close-x { position: absolute; top: 15px; right: 20px; font-size: 2rem; color: var(--fpt-red); cursor: pointer; z-index: 100; }
        /* Slider candidatos */
        .slider-wrapper { position: relative; width: 100%; overflow: hidden; }
        #auth-track { display: flex; transition: transform 0.5s cubic-bezier(0.23, 1, 0.32, 1); }
        .auth-slide { 
            min-width: 100%; height: 480px; overflow-y: auto; padding: 0 25px;
            display: flex; flex-direction: column; align-items: center; scrollbar-width: thin;
        }
        .auth-img { 
            width: 180px; height: 180px; object-fit: cover; border-radius: 50%; 
            margin-bottom: 15px; border: 4px solid var(--fpt-red); box-shadow: 0 8px 15px rgba(0,0,0,0.1);
        }
        .sticky-info {
            position: sticky; top: 0; background: white; width: 100%; text-align: center;
            padding: 10px 0 5px 0; z-index: 10;
        }
        .nav-arrow { 
            position: absolute; top: 35%; transform: translateY(-50%); background: rgba(255,255,255,0.9);
            border: 1px solid #DDD; border-radius: 50%; width: 40px; height: 40px;
            font-size: 1.2rem; z-index: 15; color: var(--fpt-black); cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .nav-arrow.left { left: 5px; }
        .nav-arrow.right { right: 5px; }
        /* Propuestas acordeón */
        .prop-lista { padding: 0 20px; }
        .prop-item {
            background: #F9F9F9; border-radius: 12px; margin-bottom: 12px; border: 1px solid #EAEAEA;
            transition: all 0.2s;
        }
        .prop-header {
            padding: 14px 16px; font-weight: 800; font-size: 0.9rem; cursor: pointer;
            display: flex; justify-content: space-between; align-items: center;
            color: var(--fpt-black); font-family: 'Playfair Display', serif;
        }
        .prop-content {
            max-height: 0; overflow: hidden; transition: all 0.4s ease;
            font-size: 0.85rem; color: #555; padding: 0 16px; text-align: justify;
        }
        .prop-item.open { background: white; border-left: 4px solid var(--fpt-red); }
        .prop-item.open .prop-content {
            max-height: 300px; overflow-y: auto; padding: 0 16px 16px 16px;
        }
        .social-bar { display: flex; justify-content: center; gap: 15px; margin: 10px 0; }
        .social-bar img { width: 35px; height: 35px; transition: transform 0.2s; }
        #lightbox { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 11000;
            display: none; align-items: center; justify-content: center; 
        }
        #lb-img { max-width: 90%; max-height: 80%; border-radius: 15px; }
    </style>
</head>
<body>

<div id="welcome-screen">
    <div class="welcome-text">
        <h2>FIUNA Para Todos</h2>
        <p class="p1">Una nueva forma de hacer ingeniería.</p>
        <p class="p2">Propuestas reales, gestión transparente.</p>
    </div>
    <button id="conocenos-btn" onclick="manejarEntrada()">Conocé el proyecto</button>
</div>

<div id="intro-screen">
    <video id="intro-video" playsinline muted preload="auto"></video>
</div>

<div id="app-container">
    <div class="hero-section">
        <div class="header">
            <img id="logo" src="" class="logo-img">
            <h1 id="titulo">Cargando...</h1>
            <div class="social-bar" id="socials"></div>
        </div>
        <img id="portada" src="" class="cover-img">

        <!-- Acordeones dinámicos desde hoja Descripciones -->
        <div class="info-accordion" id="acordeones-dinamicos"></div>

        <div class="buttons-wrap">
            <a id="link-whatsapp" href="#" class="flat-btn" target="_blank">📲 ¡Sé parte del equipo!</a>
            <a id="link-instagram" href="#" class="flat-btn" target="_blank">Seguinos en Instagram</a>
        </div>
    </div>

    <div id="sec-aut" class="collapsible-section" onclick="toggleSec('sec-aut')">
        <div class="section-banner-container">
            <div class="click-notice">Conocé a los candidatos</div>
            <img id="banner-aut" src="" class="section-banner">
        </div>
        <div class="content-area" onclick="event.stopPropagation()">
            <span class="close-x" onclick="toggleSec('sec-aut')">&times;</span>
            <h2 id="tit-aut" style="font-family:'Playfair Display'; margin-bottom: 5px; font-size: 1.4rem; color: var(--fpt-red);"></h2>
            <p id="sub-aut" style="font-size: 0.8rem; margin-bottom: 20px; color: #777;"></p>
            <div class="slider-wrapper">
                <button class="nav-arrow left" onclick="moveAuth(-1)">&#10094;</button>
                <div id="auth-track"></div>
                <button class="nav-arrow right" onclick="moveAuth(1)">&#10095;</button>
            </div>
        </div>
    </div>

    <div id="sec-propuestas" class="collapsible-section" onclick="toggleSec('sec-propuestas')">
        <div class="section-banner-container">
            <div class="click-notice">Propuestas y eventos</div>
            <img id="banner-prop" src="" class="section-banner">
        </div>
        <div class="content-area" onclick="event.stopPropagation()">
            <span class="close-x" onclick="toggleSec('sec-propuestas')">&times;</span>
            <h2 id="prop-tit" style="font-family:'Playfair Display'; padding:0 20px; text-align: left; font-size: 1.3rem;"></h2>
            <p id="prop-desc" style="font-size:0.8rem; padding:0 25px; text-align:justify; color:#555; margin-bottom: 15px;"></p>
            <div id="prop-lista" class="prop-lista"></div>
        </div>
    </div>
</div>

<div id="lightbox" onclick="this.style.display='none'"><img id="lb-img" src=""></div>

<script>
    // ==================== CONFIGURACIÓN ====================
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbypS1dZ7ol8RcoWVDhPZG9QsqORcy5hdZfK533J5sw5e2iKDWOxwRIda4BAsCZBsmyyyQ/exec"; // 👈 REEMPLAZA CON TU URL

    let autoridades = [];
    let authIdx = 0;
    let startX = 0;

    // Formateo de texto para saltos de línea
    function formatText(text) {
        if (!text) return "";
        text = text.replace(/\. /g, '.<br><br>');
        text = text.replace(/  /g, '<br><br>');
        text = text.replace(/\n/g, '<br>');
        return text;
    }

    function fix(url) {
        if (!url) return "";
        url = url.trim();
        if (url.includes('imgur.com')) {
            const id = url.split('/').pop().split('.')[0];
            return `https://i.imgur.com/${id}.jpg`;
        }
        return url;
    }

    // ==================== NAVEGACIÓN A PROPUESTAS ====================
    function irAPropuestasDeCargo(cargo) {
        const secProp = document.getElementById('sec-propuestas');
        if (!secProp.classList.contains('active')) {
            toggleSec('sec-propuestas');
        }
        setTimeout(() => {
            const propItems = document.querySelectorAll('.prop-item');
            let encontrado = false;
            const cargoLower = cargo.toLowerCase();
            for (let item of propItems) {
                const header = item.querySelector('.prop-header span:first-child');
                if (header) {
                    const titulo = header.innerText.toLowerCase();
                    if (titulo.includes(cargoLower) || cargoLower.includes(titulo.substring(0, 10))) {
                        if (!item.classList.contains('open')) item.classList.add('open');
                        item.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        encontrado = true;
                        break;
                    }
                }
            }
            if (!encontrado) {
                secProp.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        }, 400);
    }

    // ==================== RENDER SLIDER CANDIDATOS ====================
    function renderAuth() {
        const track = document.getElementById('auth-track');
        track.innerHTML = autoridades.map(a => {
            const cargoEscapado = a.cargo.replace(/'/g, "\\'");
            return `
                <div class="auth-slide" data-id="${a.id}">
                    <img src="${fix(a.foto)}" class="auth-img">
                    <div class="sticky-info">
                        <div style="font-weight:800; font-size:1rem; text-transform:uppercase;">${a.nombre}</div>
                        <div style="font-size:0.75rem; color:var(--fpt-red); font-weight:700;">${a.cargo}</div>
                    </div>
                    <div style="text-align:justify; font-size:0.85rem; line-height:1.6; padding:10px 0;">${formatText(a.bio || '')}</div>
                    <button class="sec-cand-link" style="margin-top:5px; background:var(--fpt-red);" onclick="irAPropuestasDeCargo('${cargoEscapado}')">📋 Ver propuestas</button>
                </div>
            `;
        }).join('');
        const trackEl = document.getElementById('auth-track');
        trackEl.ontouchstart = e => startX = e.touches[0].clientX;
        trackEl.ontouchend = e => {
            let diff = startX - e.changedTouches[0].clientX;
            if (Math.abs(diff) > 50) moveAuth(diff > 0 ? 1 : -1);
        };
    }

    function moveAuth(dir) {
        authIdx = (authIdx + dir + autoridades.length) % autoridades.length;
        document.getElementById('auth-track').style.transform = `translateX(-${authIdx * 100}%)`;
    }

    function jumpToCandidate(id) {
        const index = autoridades.findIndex(c => c.id == id);
        if (index !== -1) {
            authIdx = index;
            document.getElementById('auth-track').style.transform = `translateX(-${authIdx * 100}%)`;
            const secAut = document.getElementById('sec-aut');
            if (!secAut.classList.contains('active')) toggleSec('sec-aut');
            setTimeout(() => secAut.scrollIntoView({ behavior: 'smooth', block: 'start' }), 300);
        }
    }

    // ==================== CARGA PRINCIPAL ====================
    async function init() {
        try {
            const res = await fetch(SCRIPT_URL);
            const d = await res.json();

            // ----- PRINCIPAL -----
            document.getElementById('logo').src = fix(d.principal["Logo de FPT"] || "");
            document.getElementById('titulo').innerText = d.principal["Título principal"] || "FPT";
            document.getElementById('portada').src = fix(d.principal["Foto portada"] || "");
            document.getElementById('link-whatsapp').href = d.principal["link se parte"] || "#";
            document.getElementById('link-instagram').href = d.principal["link instagram"] || "#";

            // Redes sociales con teléfono
            const telefono = d.principal["link logo numero"] || "";
            document.getElementById('socials').innerHTML = `
                <a href="${d.principal["link instagram"] || '#'}" target="_blank"><img src="https://cdn-icons-png.flaticon.com/512/174/174855.png"></a>
                <a href="${d.principal["link se parte"] || '#'}" target="_blank"><img src="https://cdn-icons-png.flaticon.com/512/3670/3670051.png"></a>
                <a href="tel:${telefono}"><img src="https://cdn-icons-png.flaticon.com/512/724/724664.png"></a>
                <a href="mailto:${d.principal.correo || ''}"><img src="https://cdn-icons-png.flaticon.com/512/732/732200.png"></a>
            `;

            // ----- CANDIDATOS (slider) -----
            autoridades = d.listaAutoridades;
            document.getElementById('banner-aut').src = fix(d.portadaAut.img);
            document.getElementById('tit-aut').innerText = d.portadaAut.titulo;
            document.getElementById('sub-aut').innerText = d.portadaAut.desc;
            renderAuth();

            // ----- ACORDEONES DINÁMICOS desde Descripciones (caso especial "Secretarías") -----
            const contenedorAcc = document.getElementById('acordeones-dinamicos');
            if (contenedorAcc && d.informativoRaw) {
                let htmlAcc = '';
                for (const [titulo, contenido] of Object.entries(d.informativoRaw)) {
                    if (titulo && contenido) {
                        if (titulo.toLowerCase().trim() === "secretarías") {
                            const secretarias = autoridades.filter(c => c.cargo && (c.cargo.toLowerCase().includes('secretaría') || c.cargo.toLowerCase().includes('secretaria')));
                            const secretariasHtml = secretarias.map(sec => {
                                const textoBoton = sec.genero === "Femenino" ? "Ver candidata" : "Ver candidato";
                                return `
                                    <div class="sec-item" onclick="toggleSecItem(this, event, ${sec.id})">
                                        <div class="sec-title">
                                            <span>${sec.cargo}</span>
                                            <span>▼</span>
                                        </div>
                                        <div class="sec-desc">
                                            ${formatText(sec.descripcionSecretaria || 'Descripción en proceso...')}
                                            <br>
                                            <a href="javascript:void(0)" class="sec-cand-link" onclick="jumpToCandidate(${sec.id}); event.stopPropagation();">${textoBoton}</a>
                                        </div>
                                    </div>
                                `;
                            }).join('');
                            htmlAcc += `
                                <div class="acc-item" onclick="toggleAcc(this)">
                                    <div class="acc-header">${titulo} <span class="arrow-icon">▼</span></div>
                                    <div class="acc-content">
                                        <div class="secretaria-accordion">${secretariasHtml || '<p>No hay secretarías cargadas.</p>'}</div>
                                    </div>
                                </div>
                            `;
                        } else {
                            htmlAcc += `
                                <div class="acc-item" onclick="toggleAcc(this)">
                                    <div class="acc-header">${titulo} <span class="arrow-icon">▼</span></div>
                                    <div class="acc-content">${formatText(contenido)}</div>
                                </div>
                            `;
                        }
                    }
                }
                contenedorAcc.innerHTML = htmlAcc || '<p style="padding:20px; text-align:center">No hay información cargada.</p>';
            }

            // ----- PROPUESTAS (acordeones) -----
            const prop = d.propuestas;
            document.getElementById('banner-prop').src = fix(prop.fotoPortada) || '';
            document.getElementById('prop-tit').innerText = prop.titulo || "Nuestras Propuestas";
            document.getElementById('prop-desc').innerText = prop.desc || "";

            const propItems = prop.items || [];
            const propHtml = propItems.map(item => `
                <div class="prop-item" onclick="this.classList.toggle('open')">
                    <div class="prop-header">
                        <span>📌 ${item.titulo}</span>
                        <span>▼</span>
                    </div>
                    <div class="prop-content">
                        ${formatText(item.contenido)}
                    </div>
                </div>
            `).join('');
            const propLista = document.getElementById('prop-lista');
            if (propLista) propLista.innerHTML = propHtml || '<p style="text-align:center; padding:20px;">No hay propuestas cargadas aún.</p>';

            // ----- VIDEO INTRO -----
            const videoUrl = d.principal["Video"] || "";
            const vid = document.getElementById('intro-video');
            if (videoUrl) {
                if (videoUrl.includes('imgur.com')) {
                    let vidId = videoUrl.split('/').pop().split('#')[0];
                    vid.src = `https://i.imgur.com/${vidId}.mp4`;
                } else {
                    vid.src = videoUrl;
                }
            }
        } catch (e) {
            console.error("Error cargando datos:", e);
            const accCont = document.getElementById('acordeones-dinamicos');
            if (accCont) accCont.innerHTML = '<p style="padding:20px; text-align:center">Error al cargar datos. Revisá consola.</p>';
        }
    }

    // Funciones UI auxiliares
    function toggleAcc(el) {
        const isOpen = el.classList.contains('open');
        document.querySelectorAll('.acc-item').forEach(item => item.classList.remove('open'));
        if (!isOpen) el.classList.add('open');
    }

    function toggleSecItem(el, event) {
        event.stopPropagation();
        const isOpen = el.classList.contains('open');
        document.querySelectorAll('.sec-item').forEach(item => item.classList.remove('open'));
        if (!isOpen) el.classList.add('open');
    }

    function toggleSec(id) {
        const sec = document.getElementById(id);
        const isActive = sec.classList.contains('active');
        if (isActive) {
            sec.classList.add('closing');
            setTimeout(() => sec.classList.remove('active', 'closing'), 500);
        } else {
            document.querySelectorAll('.collapsible-section').forEach(s => s.classList.remove('active'));
            sec.classList.add('active');
            setTimeout(() => {
                const offset = sec.getBoundingClientRect().top + window.pageYOffset - 20;
                window.scrollTo({ top: offset, behavior: 'smooth' });
            }, 400);
        }
    }

    function manejarEntrada() {
        const v = document.getElementById('intro-video');
        const welcome = document.getElementById('welcome-screen');
        welcome.style.opacity = '0';
        setTimeout(() => {
            welcome.style.display = 'none';
            if (v.src && v.readyState >= 3) {
                document.getElementById('intro-screen').style.display = 'flex';
                setTimeout(() => { document.getElementById('intro-screen').style.opacity = '1'; }, 50);
                v.muted = false;
                v.play().catch(mostrarApp);
                v.onended = mostrarApp;
            } else {
                mostrarApp();
            }
        }, 1200);
    }

    function mostrarApp() {
        const intro = document.getElementById('intro-screen');
        const app = document.getElementById('app-container');
        intro.style.opacity = '0';
        setTimeout(() => {
            intro.style.display = 'none';
            app.style.display = 'block';
            setTimeout(() => { app.style.opacity = '1'; }, 50);
        }, 1200);
    }

    function openLB(url) {
        document.getElementById('lb-img').src = url;
        document.getElementById('lightbox').style.display = 'flex';
    }

    init();
</script>
</body>
</html>
